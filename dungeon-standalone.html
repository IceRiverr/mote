<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dungeon — mote</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e0e0e0;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .back {
    color: #6bb8ff;
    text-decoration: none;
    font-size: 0.85rem;
    opacity: 0.7;
    transition: opacity 0.15s;
  }
  .back:hover { opacity: 1; }
  h1 { font-size: 1.2rem; font-weight: 300; letter-spacing: 0.08em; }
  h1 span { color: #c084fc; font-weight: 600; }
  .game-wrapper {
    position: relative;
    display: inline-block;
  }
  canvas {
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(192, 132, 252, 0.15);
    image-rendering: pixelated;
    touch-action: none;
    display: block;
  }
  /* D-pad for touch controls - positioned relative to game area */
  .dpad-container {
    position: absolute;
    bottom: 16px;
    right: 16px;
    width: 140px;
    height: 140px;
    display: none;
    user-select: none;
    -webkit-user-select: none;
    pointer-events: auto;
  }
  .dpad-container.visible {
    display: block;
  }
  .dpad {
    position: relative;
    width: 100%;
    height: 100%;
  }
  .dpad-btn {
    position: absolute;
    width: 44px;
    height: 44px;
    background: rgba(0, 0, 0, 0.7);
    border: 2px solid rgba(0, 0, 0, 0.9);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #fff;
    text-shadow: 0 0 4px #000, 0 0 8px #000;
    cursor: pointer;
    transition: all 0.1s;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }
  .dpad-btn:hover {
    background: rgba(20, 20, 20, 0.85);
    border-color: rgba(100, 100, 100, 0.8);
  }
  .dpad-btn:active, .dpad-btn.active {
    background: rgba(0, 0, 0, 0.9);
    border-color: #6bb8ff;
    color: #6bb8ff;
    box-shadow: 0 0 12px rgba(107, 184, 255, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  }
  .dpad-up { top: 0; left: 48px; }
  .dpad-down { bottom: 0; left: 48px; }
  .dpad-left { top: 48px; left: 0; }
  .dpad-right { top: 48px; right: 0; }
  .dpad-center {
    top: 48px;
    left: 48px;
    background: rgba(30, 30, 30, 0.8);
    border-color: rgba(0, 0, 0, 0.9);
    pointer-events: none;
    color: #888;
  }
  #status { margin-top: 12px; font-size: 0.8rem; color: #666; }
  #fallback {
    display: none; margin-top: 20px; padding: 20px;
    background: #1a1a2e; border-radius: 8px; border: 1px solid #333;
    max-width: 500px; text-align: center; line-height: 1.6;
  }
</style>
