<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout — mote</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #faf8f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #1a1a1a;
    padding: 20px;
  }
  .game-wrapper {
    position: relative;
    display: inline-block;
  }
  canvas {
    border-radius: 8px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    image-rendering: pixelated;
    touch-action: none;
    display: block;
    max-width: 100vw;
    max-height: calc(100vh - 120px);
  }
  #status { margin-top: 12px; font-size: 0.8rem; color: #a0a0a0; }
  #fallback {
    display: none; margin-top: 20px; padding: 20px;
    background: #fff; border-radius: 8px; border: 1px solid #e8e4de;
    max-width: 500px; text-align: center; line-height: 1.6;
    color: #6b6b6b;
  }
  .touch-hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    color: rgba(255,255,255,0.55);
    pointer-events: none;
    display: none;
  }
  .touch-hint.visible { display: block; }
</style>
</head>
<body>
  <div class="game-wrapper">
    <canvas id="canvas" width="1280" height="960"></canvas>
    <div class="touch-hint" id="touchHint">左右滑动控制挡板 · 点击发射/开始</div>
  </div>
  <div id="status">Initializing WebGPU...</div>
  <div id="fallback">
    <p>⚠️ WebGPU is not available on this device/browser.</p>
    <p style="margin-top:8px; font-size:0.8rem; color:#a0a0a0;">
      Requires: Chrome 113+ / Edge 113+ / Safari 26+
    </p>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
