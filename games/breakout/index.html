<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout — mote</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e0e0e0;
    padding: 20px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .back {
    color: #6bb8ff;
    text-decoration: none;
    font-size: 0.85rem;
    opacity: 0.7;
    transition: opacity 0.15s;
  }
  .back:hover { opacity: 1; }
  h1 { font-size: 1.2rem; font-weight: 300; letter-spacing: 0.08em; }
  h1 span { color: #60a5fa; font-weight: 600; }
  .game-wrapper {
    position: relative;
    display: inline-block;
  }
  canvas {
    border-radius: 8px;
    box-shadow: 0 0 60px rgba(96, 165, 250, 0.15);
    image-rendering: pixelated;
    touch-action: none;
    display: block;
    max-width: 100vw;
    max-height: calc(100vh - 120px);
  }
  #status { margin-top: 12px; font-size: 0.8rem; color: #666; }
  #fallback {
    display: none; margin-top: 20px; padding: 20px;
    background: #1a1a2e; border-radius: 8px; border: 1px solid #333;
    max-width: 500px; text-align: center; line-height: 1.6;
  }
  .touch-hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    color: rgba(255,255,255,0.4);
    pointer-events: none;
    display: none;
  }
  .touch-hint.visible { display: block; }
</style>
</head>
<body>
  <div class="header">
    <a class="back" href="/">← 返回游戏列表</a>
    <h1><span>Breakout</span></h1>
  </div>
  <div class="game-wrapper">
    <canvas id="canvas" width="1280" height="960"></canvas>
    <div class="touch-hint" id="touchHint">左右滑动控制挡板 · 点击发射/开始</div>
  </div>
  <div id="status">Initializing WebGPU...</div>
  <div id="fallback">
    <p>⚠️ WebGPU is not available on this device/browser.</p>
    <p style="margin-top:8px; font-size:0.8rem; color:#666;">
      Requires: Chrome 113+ / Edge 113+ / Safari 26+
    </p>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
