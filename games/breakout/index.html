<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout — mote</title>
<link rel="icon" href="../../mote-logo.svg" type="image/svg+xml">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #888;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #game-root {
    position: relative;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    image-rendering: pixelated;
    touch-action: none;
    display: block;
    max-width: 100vw;
    max-height: 100vh;
  }
  #status {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    color: #444;
    pointer-events: none;
  }
  #fallback {
    display: none;
    padding: 24px;
    background: #111;
    border-radius: 10px;
    border: 1px solid #222;
    max-width: 420px;
    text-align: center;
    line-height: 1.6;
    color: #aaa;
  }
  .touch-hint {
    position: absolute;
    bottom: 44px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.72rem;
    color: rgba(255,255,255,0.35);
    pointer-events: none;
    display: none;
  }
  .touch-hint.visible { display: block; }
  .fs-btn {
    position: absolute;
    bottom: 12px;
    right: 12px;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.5);
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    z-index: 10;
    user-select: none;
  }
  .fs-btn:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.8);
  }
</style>
</head>
<body>
  <div id="game-root">
    <canvas id="canvas" width="1280" height="960"></canvas>
    <div class="touch-hint" id="touchHint">左右滑动控制挡板 · 点击发射/开始</div>
    <div id="status">Initializing WebGPU...</div>
    <div id="fallback">
      <p>⚠️ WebGPU is not available on this device/browser.</p>
      <p style="margin-top:8px; font-size:0.8rem; color:#666;">
        Requires: Chrome 113+ / Edge 113+ / Safari 26+
      </p>
    </div>
    <button class="fs-btn" id="fsBtn" title="全屏">⛶</button>
  </div>

  <script type="module" src="./main.ts"></script>
  <script>
    (function() {
      const canvas = document.getElementById('canvas');
      const btn = document.getElementById('fsBtn');
      if (!btn || !canvas) return;
      btn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          canvas.requestFullscreen?.() || document.body.requestFullscreen?.();
        } else {
          document.exitFullscreen?.();
        }
      });
      document.addEventListener('fullscreenchange', () => {
        btn.textContent = document.fullscreenElement ? '⛶' : '⛶';
      });
    })();
  </script>
</body>
</html>
