<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake — mote</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #faf8f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #1a1a1a;
  }
  .game-wrapper {
    position: relative;
    display: inline-block;
  }
  canvas {
    border-radius: 8px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    image-rendering: pixelated;
    touch-action: none;
    display: block;
  }
  .dpad-container {
    position: absolute;
    bottom: 16px;
    right: 16px;
    width: 140px;
    height: 140px;
    display: none;
    user-select: none;
    -webkit-user-select: none;
    pointer-events: auto;
  }
  .dpad-container.visible {
    display: block;
  }
  .dpad {
    position: relative;
    width: 100%;
    height: 100%;
  }
  .dpad-btn {
    position: absolute;
    width: 44px;
    height: 44px;
    background: rgba(255, 255, 255, 0.9);
    border: 2px solid rgba(0, 0, 0, 0.15);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #333;
    text-shadow: none;
    cursor: pointer;
    transition: all 0.1s;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
  }
  .dpad-btn:hover {
    background: rgba(255, 255, 255, 1);
    border-color: rgba(0, 0, 0, 0.3);
  }
  .dpad-btn:active, .dpad-btn.active {
    background: rgba(240, 240, 240, 1);
    border-color: #2b6cb0;
    color: #2b6cb0;
    box-shadow: 0 0 12px rgba(43, 108, 176, 0.2);
  }
  .dpad-up { top: 0; left: 48px; }
  .dpad-down { bottom: 0; left: 48px; }
  .dpad-left { top: 48px; left: 0; }
  .dpad-right { top: 48px; right: 0; }
  .dpad-center {
    top: 48px;
    left: 48px;
    background: rgba(245, 245, 245, 0.9);
    border-color: rgba(0, 0, 0, 0.15);
    pointer-events: none;
    color: #888;
  }
  #status { margin-top: 12px; font-size: 0.8rem; color: #a0a0a0; }
  #fallback {
    display: none; margin-top: 20px; padding: 20px;
    background: #fff; border-radius: 8px; border: 1px solid #e8e4de;
    max-width: 500px; text-align: center; line-height: 1.6;
    color: #6b6b6b;
  }
</style>
</head>
<body>
  <div class="game-wrapper">
    <canvas id="canvas" width="640" height="480"></canvas>
    <div class="dpad-container" id="dpad">
      <div class="dpad">
        <div class="dpad-btn dpad-up" data-dir="up">▲</div>
        <div class="dpad-btn dpad-down" data-dir="down">▼</div>
        <div class="dpad-btn dpad-left" data-dir="left">◀</div>
        <div class="dpad-btn dpad-right" data-dir="right">▶</div>
        <div class="dpad-btn dpad-center">●</div>
      </div>
    </div>
  </div>
  <div id="status">Initializing WebGPU...</div>
  <div id="fallback">
    <p>⚠️ WebGPU is not available on this device/browser.</p>
    <p style="margin-top:8px; font-size:0.8rem; color:#a0a0a0;">
      Requires: Chrome 113+ / Edge 113+ / Safari 26+
    </p>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
