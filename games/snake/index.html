<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake — mote</title>
<link rel="icon" href="../../mote-logo.svg" type="image/svg+xml">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #888;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #game-root {
    position: relative;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    image-rendering: pixelated;
    touch-action: none;
    display: block;
    max-width: 100vw;
    max-height: 100vh;
  }
  #status {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    color: #444;
    pointer-events: none;
  }
  #fallback {
    display: none;
    padding: 24px;
    background: #111;
    border-radius: 10px;
    border: 1px solid #222;
    max-width: 420px;
    text-align: center;
    line-height: 1.6;
    color: #aaa;
  }
  .dpad-container {
    position: absolute;
    bottom: 52px;
    right: 16px;
    width: 140px;
    height: 140px;
    display: none;
    user-select: none;
    -webkit-user-select: none;
    pointer-events: auto;
  }
  .dpad-container.visible { display: block; }
  .dpad {
    position: relative;
    width: 100%;
    height: 100%;
  }
  .dpad-btn {
    position: absolute;
    width: 44px;
    height: 44px;
    background: rgba(30, 30, 30, 0.85);
    border: 2px solid rgba(255, 255, 255, 0.15);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #ccc;
    cursor: pointer;
    transition: all 0.1s;
  }
  .dpad-btn:hover {
    background: rgba(50, 50, 50, 0.9);
    border-color: rgba(255, 255, 255, 0.3);
  }
  .dpad-btn:active, .dpad-btn.active {
    background: rgba(20, 20, 20, 0.95);
    border-color: #4ade80;
    color: #4ade80;
    box-shadow: 0 0 12px rgba(74, 222, 128, 0.3);
  }
  .dpad-up { top: 0; left: 48px; }
  .dpad-down { bottom: 0; left: 48px; }
  .dpad-left { top: 48px; left: 0; }
  .dpad-right { top: 48px; right: 0; }
  .dpad-center {
    top: 48px;
    left: 48px;
    background: rgba(40, 40, 40, 0.8);
    border-color: rgba(255, 255, 255, 0.1);
    pointer-events: none;
    color: #666;
  }
  .fs-btn {
    position: absolute;
    bottom: 12px;
    right: 12px;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.5);
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    z-index: 10;
    user-select: none;
  }
  .fs-btn:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.8);
  }
</style>
</head>
<body>
  <div id="game-root">
    <canvas id="canvas" width="640" height="480"></canvas>
    <div class="dpad-container" id="dpad">
      <div class="dpad">
        <div class="dpad-btn dpad-up" data-dir="up">▲</div>
        <div class="dpad-btn dpad-down" data-dir="down">▼</div>
        <div class="dpad-btn dpad-left" data-dir="left">◀</div>
        <div class="dpad-btn dpad-right" data-dir="right">▶</div>
        <div class="dpad-btn dpad-center">●</div>
      </div>
    </div>
    <div id="status">Initializing WebGPU...</div>
    <div id="fallback">
      <p>⚠️ WebGPU is not available on this device/browser.</p>
      <p style="margin-top:8px; font-size:0.8rem; color:#666;">
        Requires: Chrome 113+ / Edge 113+ / Safari 26+
      </p>
    </div>
    <button class="fs-btn" id="fsBtn" title="全屏">⛶</button>
  </div>

  <script type="module" src="./main.ts"></script>
  <script>
    (function() {
      const canvas = document.getElementById('canvas');
      const btn = document.getElementById('fsBtn');
      if (!btn || !canvas) return;
      btn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          canvas.requestFullscreen?.() || document.body.requestFullscreen?.();
        } else {
          document.exitFullscreen?.();
        }
      });
    })();
  </script>
</body>
</html>
