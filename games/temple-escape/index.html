<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temple Escape</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; font-family: 'Courier New', monospace; }
    #game-canvas { image-rendering: pixelated; image-rendering: crisp-edges; border: 2px solid #e94560; }
    #ui-overlay { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: #eee; font-size: 14px; pointer-events: none; display: flex; gap: 20px; }
    #ui-overlay span { background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 4px; }
    #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #e94560; font-size: 32px; display: none; text-align: center; }
    #game-over button { margin-top: 16px; padding: 8px 24px; font-size: 18px; background: #e94560; color: white; border: none; cursor: pointer; border-radius: 4px; pointer-events: all; }
    #game-over button:hover { background: #ff6b6b; }
    #start-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #eee; text-align: center; }
    #start-screen h1 { font-size: 36px; color: #e94560; margin-bottom: 8px; }
    #start-screen p { margin-bottom: 16px; font-size: 14px; color: #888; }
    #start-screen button { padding: 12px 32px; font-size: 20px; background: #e94560; color: white; border: none; cursor: pointer; border-radius: 4px; }
  </style>
</head>
<body>
  <canvas id="game-canvas" width="320" height="480"></canvas>
  <div id="ui-overlay">
    <span id="score-display">Score: 0</span>
    <span id="distance-display">Distance: 0m</span>
    <span id="lives-display">&#9829;&#9829;&#9829;</span>
  </div>
  <div id="game-over">
    <div>GAME OVER</div>
    <div id="final-score" style="font-size:18px; margin-top:8px;"></div>
    <button id="restart-btn">Restart</button>
  </div>
  <div id="start-screen">
    <h1>&#9906; Temple Escape</h1>
    <p>Use A/D or &#8592;/&#8594; to switch lanes<br>Space to jump, S to slide<br>Collect gems, avoid traps!</p>
    <button id="start-btn">Start</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
