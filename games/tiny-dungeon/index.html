<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiny Dungeon — mote</title>
<link rel="icon" href="../../mote-logo.svg" type="image/svg+xml">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000;
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #888;
  }
  #game-root {
    position: relative;
    width: 100%; height: 100%;
  }
  canvas {
    image-rendering: pixelated;
    touch-action: none;
    display: block;
    width: 100%;
    height: 100%;
  }
  #status {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    color: #444;
    pointer-events: none;
  }
  #levelup-panel {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 100;
  }
  #levelup-panel.active { display: flex; }
  #levelup-panel h2 {
    color: #ffd700;
    font-size: 1.5rem;
    margin-bottom: 8px;
    text-shadow: 0 0 8px rgba(255,215,0,0.4);
  }
  #gameover-panel {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    z-index: 200;
  }
  #gameover-panel.active { display: flex; }
  #gameover-panel h2 {
    color: #ff4444;
    font-size: 2rem;
    margin-bottom: 4px;
    text-shadow: 0 0 12px rgba(255,68,68,0.4);
  }
  #gameover-panel .stat {
    color: #ccc;
    font-size: 1.1rem;
  }
  #gameover-panel .stat span {
    color: #fff;
    font-weight: 600;
  }
  /* ── HUD ── */
  #hud {
    position: absolute;
    top: 12px; left: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    pointer-events: none;
    z-index: 50;
    font-family: 'Courier New', Courier, monospace;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  }
  #hud-time {
    position: absolute;
    top: 12px; right: 12px;
    font-family: 'Courier New', Courier, monospace;
    font-size: 1.1rem;
    color: #fff;
    letter-spacing: 1px;
    pointer-events: none;
    z-index: 50;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  }
  .hud-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    color: #ddd;
  }
  .hp-bar-wrap {
    width: 160px;
    height: 14px;
    background: rgba(0,0,0,0.6);
    border: 2px solid #444;
    image-rendering: pixelated;
    position: relative;
  }
  .hp-bar-fill {
    height: 100%;
    width: 100%;
    background: #4caf50;
    transition: width 0.1s linear, background 0.2s;
  }
  .hp-bar-text {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: #fff;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .upgrade-btn {
    width: 240px;
    padding: 14px 20px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    color: #eee;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .upgrade-btn:hover {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,215,0,0.5);
    color: #fff;
    transform: scale(1.03);
  }
  .upgrade-btn .label {
    font-weight: 600;
    color: #ffd700;
    font-size: 1.1rem;
  }
  .upgrade-btn .desc {
    font-size: 0.8rem;
    color: #aaa;
    margin-top: 4px;
  }
  #fallback {
    display: none;
    padding: 24px;
    background: #111;
    border-radius: 10px;
    border: 1px solid #222;
    max-width: 420px;
    text-align: center;
    line-height: 1.6;
    color: #aaa;
  }
  .fs-btn {
    position: absolute;
    bottom: 12px;
    right: 12px;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.5);
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    z-index: 10;
    user-select: none;
  }
  .fs-btn:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.8);
  }
</style>
</head>
<body>
  <div id="game-root">
    <canvas id="canvas"></canvas>
    <div id="status">Initializing WebGPU...</div>
    <div id="fallback">
      <p>⚠️ WebGPU is not available on this device/browser.</p>
      <p style="margin-top:8px; font-size:0.8rem; color:#666;">
        Requires: Chrome 113+ / Edge 113+ / Safari 26+
      </p>
    </div>
    <div id="levelup-panel">
      <h2>⚔️ 升级！</h2>
      <button class="upgrade-btn" id="upg0">
        <div class="label">伤害 +20%</div>
        <div class="desc">投射物造成更多伤害</div>
      </button>
      <button class="upgrade-btn" id="upg1">
        <div class="label">攻速 +15%</div>
        <div class="desc">发射间隔缩短</div>
      </button>
      <button class="upgrade-btn" id="upg2">
        <div class="label">投射物 +1</div>
        <div class="desc">每次多发射一枚</div>
      </button>
    </div>
    <div id="gameover-panel">
      <h2>☠️ 你倒下了</h2>
      <div class="stat">击杀骷髅：<span id="go-kills">0</span></div>
      <div class="stat">存活时间：<span id="go-time">0:00</span></div>
      <button class="upgrade-btn" id="go-restart" style="margin-top:12px;">
        <div class="label">再来一次</div>
      </button>
    </div>
    <div id="hud">
      <div class="hud-row">
        <div class="hp-bar-wrap">
          <div class="hp-bar-fill" id="hp-fill"></div>
          <div class="hp-bar-text" id="hp-text">100 / 100</div>
        </div>
      </div>
      <div class="hud-row">
        <span>LV <span id="hud-lv" style="color:#ffd700;">1</span></span>
        <span>|</span>
        <span>击杀 <span id="hud-kills" style="color:#ff8888;">0</span></span>
      </div>
    </div>
    <div id="hud-time">0:00</div>
    <button class="fs-btn" id="fsBtn" title="全屏">⛶</button>
  </div>

  <script type="module" src="./main.ts"></script>
  <script>
    (function() {
      const canvas = document.getElementById('canvas');
      const btn = document.getElementById('fsBtn');
      if (!btn || !canvas) return;
      btn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          canvas.requestFullscreen?.() || document.body.requestFullscreen?.();
        } else {
          document.exitFullscreen?.();
        }
      });
    })();
  </script>
</body>
</html>
