<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floe Engine</title>
<style>
  * { margin: 0; padding: 0; }
  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e0e0e0;
  }
  canvas {
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(100, 180, 255, 0.15);
    image-rendering: pixelated;
  }
  h1 { margin-bottom: 16px; font-size: 1.4rem; font-weight: 300; letter-spacing: 0.1em; }
  h1 span { color: #6bb8ff; font-weight: 600; }
  #status { margin-top: 12px; font-size: 0.85rem; color: #888; }
  #fallback {
    display: none; margin-top: 20px; padding: 20px;
    background: #1a1a2e; border-radius: 8px; border: 1px solid #333;
    max-width: 500px; text-align: center; line-height: 1.6;
  }
</style>
</head>
<body>
  <h1><span>mote</span> 引擎，这是一个轻量级的2d游戏引擎。感谢我的女朋友，圆圆，最爱你了，宝贝！！！</h1>
  <canvas id="canvas" width="640" height="480"></canvas>
  <div id="status">Initializing WebGPU...</div>
  <div id="fallback">
    <p>⚠️ WebGPU is not available on this device/browser.</p>
    <p style="margin-top:8px; font-size:0.8rem; color:#666;">
      Requires: Chrome 113+ / Edge 113+ / Safari 26+<br>
      Android: Chrome 121+ (ARM/Qualcomm, Android 12+)
    </p>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
