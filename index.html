<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mote engine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e0e0e0;
  }
  header { text-align: center; margin-bottom: 48px; }
  h1 { font-size: 2rem; font-weight: 200; letter-spacing: 0.15em; }
  h1 span { color: #6bb8ff; font-weight: 600; }
  .subtitle { margin-top: 8px; font-size: 0.85rem; color: #444; letter-spacing: 0.05em; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    width: min(900px, 90vw);
  }

  .card {
    background: #111118;
    border: 1px solid #1e1e2e;
    border-radius: 12px;
    padding: 24px 20px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .card:hover {
    border-color: #6bb8ff44;
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(100, 180, 255, 0.08);
  }
  .card-title {
    font-size: 1rem;
    font-weight: 500;
    color: #c8e0ff;
  }
  .card-desc {
    font-size: 0.8rem;
    color: #555;
    line-height: 1.5;
  }
  .card-tag {
    margin-top: 4px;
    font-size: 0.7rem;
    color: #6bb8ff88;
    letter-spacing: 0.05em;
  }

  footer {
    margin-top: 64px;
    font-size: 0.75rem;
    color: #2a2a3a;
  }
</style>
</head>
<body>
  <header>
    <h1><span>mote</span> a tiny web game engine</h1>
    <p class="subtitle">游戏列表</p>
  </header>

  <div class="grid">
    <a class="card" href="/games/tiny-town/">
      <div class="card-title">Tiny Town</div>
      <div class="card-desc">Kenney Tiny Town 素材的 Tilemap 渲染演示，支持键盘 / 手柄平移视角。</div>
      <div class="card-tag">DEMO · TILEMAP</div>
    </a>
    <a class="card" href="/games/dungeon/">
      <div class="card-title">Dungeon</div>
      <div class="card-desc">Kenney Scribble Dungeons 素材的地牢地图渲染，支持键盘 / 手柄平移视角。</div>
      <div class="card-tag">DEMO · DUNGEON</div>
    </a>
  </div>

  <footer>mote — WebGPU</footer>
</body>
</html>
