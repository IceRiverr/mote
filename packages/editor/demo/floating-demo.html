<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Panel Demo</title>
  <style>
    :root {
      --color-bg-primary: #1e1e2e;
      --color-bg-secondary: #252535;
      --color-bg-tertiary: #2a2a3c;
      --color-text-primary: #e0e0e0;
      --color-accent: #6bb8ff;
      --color-border: #3a3a4a;
    }
    
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      height: 100vh;
      overflow: hidden;
    }
    
    #app {
      width: 100%;
      height: 100%;
    }
    
    .demo-controls {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10000;
      background: var(--color-bg-secondary);
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--color-border);
    }
    
    .demo-controls button {
      margin: 4px;
      padding: 8px 16px;
      background: var(--color-bg-tertiary);
      border: 1px solid var(--color-border);
      color: var(--color-text-primary);
      border-radius: 4px;
      cursor: pointer;
    }
    
    .demo-controls button:hover {
      background: var(--color-accent);
    }
    
    .demo-controls h3 {
      margin-top: 0;
      color: var(--color-accent);
    }
  </style>
</head>
<body>
  <div class="demo-controls">
    <h3>浮动面板演示</h3>
    <p>点击下方按钮打开浮动面板：</p>
    <button onclick="openPanel('hierarchy')">打开 Hierarchy</button>
    <button onclick="openPanel('inspector')">打开 Inspector</button>
    <button onclick="openPanel('tilemap')">打开 Tile Sets</button>
    <button onclick="closeAllPanels()">关闭所有</button>
  </div>
  
  <div id="app"></div>
  
  <script type="module">
    import { h, render } from 'preact';
    import { FloatingPanel, DockedPanel } from '../dist/ui/components/FloatingPanel.js';
    
    const app = document.getElementById('app');
    const panels = new Map();
    
    window.openPanel = (type) => {
      if (panels.has(type)) return;
      
      const titles = {
        hierarchy: 'Hierarchy',
        inspector: 'Inspector', 
        tilemap: 'Tile Sets'
      };
      
      const contents = {
        hierarchy: h('div', null, 
          h('p', null, '实体列表'),
          h('ul', null, [
            h('li', null, 'Player'),
            h('li', null, 'Enemy'),
            h('li', null, 'Item')
          ])
        ),
        inspector: h('div', null,
          h('p', null, '属性面板'),
          h('label', null, 'Name: ', h('input', { value: 'Player' }))
        ),
        tilemap: h('div', null,
          h('p', null, 'Tile Sets'),
          h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '4px' } },
            Array.from({ length: 16 }, (_, i) => 
              h('button', { 
                style: { 
                  width: '40px', 
                  height: '40px',
                  background: '#4a5568',
                  border: '1px solid var(--color-border)'
                } 
              }, i + 1)
            )
          )
        )
      };
      
      const panel = h(FloatingPanel, {
        id: type,
        title: titles[type],
        defaultPosition: { 
          x: 100 + Math.random() * 200, 
          y: 100 + Math.random() * 100 
        },
        onClose: () => {
          panels.delete(type);
          renderPanels();
        },
        onFocus: () => {
          // Bring to front
          panels.forEach((p, key) => {
            if (key !== type) p.isActive = false;
          });
          const p = panels.get(type);
          if (p) p.isActive = true;
          renderPanels();
        }
      }, contents[type]);
      
      panels.set(type, { component: panel, isActive: true });
      renderPanels();
    };
    
    window.closeAllPanels = () => {
      panels.clear();
      renderPanels();
    };
    
    function renderPanels() {
      render(
        h('div', { class: 'floating-container' },
          Array.from(panels.values()).map(p => p.component)
        ),
        app
      );
    }
    
    // 初始显示停靠面板示例
    const dockedExample = h(DockedPanel, {
      title: 'Docked Example',
      onUndock: () => alert('点击了浮动按钮！')
    }, h('p', null, '这是一个停靠面板的示例。点击右上角的 ⧉ 按钮可以将其变为浮动面板。'));
    
    // 渲染停靠示例在页面中央
    const demoContainer = document.createElement('div');
    demoContainer.style.cssText = `
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 300px;
      z-index: 1;
    `;
    document.body.appendChild(demoContainer);
    render(dockedExample, demoContainer);
  </script>
</body>
</html>
