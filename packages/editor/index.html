<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mote - 2D Web Game Editor">
  <title>Mote Editor</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎮%3C/text%3E%3C/svg%3E">
  
  <!-- Preconnect to external domains if needed -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  
  <style>
    /* Critical CSS - Load immediately */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #1e1e2e;
      color: #e0e0e0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    #app {
      width: 100%;
      height: 100%;
    }
    
    /* Loading state */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
    }
    
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(107, 184, 255, 0.2);
      border-top-color: #6bb8ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    .loading-text {
      font-size: 14px;
      color: #666;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Error state */
    .error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      padding: 20px;
      text-align: center;
    }
    
    .error-icon {
      font-size: 48px;
    }
    
    .error-title {
      font-size: 18px;
      font-weight: 600;
      color: #e0e0e0;
    }
    
    .error-message {
      font-size: 14px;
      color: #666;
      max-width: 400px;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Loading state shown until Preact app mounts -->
    <div class="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading Mote Editor...</div>
    </div>
  </div>
  
  <script type="module" src="./src/main.tsx"></script>
  
  <noscript>
    <div class="error">
      <div class="error-icon">⚠️</div>
      <div class="error-title">JavaScript Required</div>
      <div class="error-message">
        Mote Editor requires JavaScript to run. Please enable JavaScript in your browser settings.
      </div>
    </div>
  </noscript>
</body>
</html>
