<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 宇宙黑 -->
  <rect width="1024" height="1024" fill="black"/>
  <!-- 日光光晕：提高亮度，让微尘在宇宙中真正被照亮 -->
  <circle cx="816" cy="698" r="480" fill="url(#sunbeam)" opacity="0.25"/>
  <!-- 微尘： Pale Blue Dot，保持 32px 方块与原 Logo 一致 -->
  <rect x="800" y="682" width="32" height="32" fill="white"/>
  <defs>
    <radialGradient id="sunbeam" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(816 698) scale(480)">
      <stop stop-color="white" stop-opacity="1"/>
      <stop offset="0.4" stop-color="white" stop-opacity="0.35"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
